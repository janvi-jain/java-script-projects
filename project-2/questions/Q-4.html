<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Numbers</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 500px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        #start, #end {
            margin: 8px 0;
            color: #0072ff;
            font-weight: bold;
        }

        #prime {
            margin-top: 20px;
            padding: 15px;
            background: #f0f8ff;
            border-radius: 10px;
            font-family: monospace;
            line-height: 1.8;
            color: #333;
            word-wrap: break-word;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Prime Numbers</h1>
        <h3 id="start"></h3>
        <h3 id="end"></h3>
        <h3 id="prime"></h3>
    </div>

    <script>
        let start = Number(prompt("Enter start of range: "));
        let end = Number(prompt("Enter end of range: "));
        let prime = ""

        document.getElementById("start").innerHTML = "Start Number of a Range : " + start;  
        document.getElementById("end").innerHTML = "End Number of a Range : " + end;  
        
        for (let i = start; i <= end; i++) {
            if (i < 2) continue;
            
            let isPrime = true;
            
            for (let j = 2; j <= i / 2; j++) {
                if (i % j === 0) {
                    isPrime = false;
                    break;
                }
            }
            
            if (isPrime) {
                prime = prime + i + " ";
            }    
        }
        document.getElementById("prime").innerHTML = "Prime Numbers from the Range : " + prime;  
    </script>

</body>

</html>
