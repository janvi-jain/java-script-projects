<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Series</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 450px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        #number {
            font-weight: bold;
            margin-bottom: 20px;
            color: #e63946;
        }

        #fib {
            background: #fff5f5;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            line-height: 1.8;
            color: #444;
            word-wrap: break-word;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Fibonacci Series</h1>
        <h3 id="number"></h3>
        <h3 id="fib"></h3>
    </div>

    <script>
        let number = Number(prompt("Enter the number of terms for the Fibonacci series : "));

        document.getElementById("number").innerHTML = "Number you Entered : " + number;

        let a = 0, b = 1, next;
        let fib = "";

        for (let i = 1; i <= number; i++) {
            fib += a + " ";
            next = a + b;
            a = b;
            b = next;
        }
        document.getElementById("fib").innerHTML += "Factors of a number : " + fib;
    </script>

</body>

</html>
