<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        #number {
            font-weight: bold;
            margin-bottom: 20px;
            color: #4e73df;
        }

        #table {
            background: #f8f9fc;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            line-height: 1.8;
            color: #333;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Multiplication Table</h1>
        <h3 id="number"></h3>
        <h3 id="table"></h3>
    </div>

    <script>
        let number = Number(prompt("Enter a Number you want a table : "));
        let table = ""

        document.getElementById("number").innerHTML = "Multiplication Table of : " + number;

        for (let i = 1; i <= 10; i++) {
            table += number + " × " + i + " = " + (number * i) + "<br>";
        }
        document.getElementById("table").innerHTML = table;
    </script>

</body>

</html>
