<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leap Year</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        h3 {
            margin: 10px 0;
            color: #555;
            font-weight: normal;
        }

        #leapYear {
            margin-top: 20px;
            padding: 10px;
            background-color: #f3f4ff;
            border-radius: 8px;
            font-weight: bold;
            color: #4b3fa7;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Leap Year Checker</h1>
        <h3 id="start"></h3>
        <h3 id="end"></h3>
        <h3 id="leapYear"></h3>
    </div>

    <script>
        let start = Number(prompt("Enter the starting year: "));
        let end = Number(prompt("Enter the Ending year : "));
        let leapYear = ""
        document.getElementById("start").innerHTML = "Start Year: " + start;
        document.getElementById("end").innerHTML = "End Year: " + end;

        if (start < end) {
            for (let i = start; i <= end; i++) {
                if ((i % 4 == 0 && i % 100 != 0) || (i % 400 == 0)) {
                    leapYear += `<span class="year-box">${i}, </span>`;;
                }
            }
            document.getElementById("leapYear").innerHTML = "Leap Years: " + leapYear;
        } else {
            document.getElementById("leapYear").innerHTML = "Start year cannot be greater than end year.";
        }
    </script>

</body>

</html>
