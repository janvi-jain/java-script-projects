<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amerce</title>

    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/fonts/stylesheet.css">

</head>

<body>
    <header>
        <div class="container"></div>
    </header>

    <section>
        <div class="row d-flex flex-wrap justify-content-center" id="container">
            <div class="col-sm-6 col-md-4 col-lg-3 mb-4">
                <div class="card" style="width: 18rem;">
                    <div class="product-image-wrapper">
                        <img src="./assets/images/product_img1.jpg" class="card-img-top" alt="Blue Dress For Woman">
                        <div class="overlay"></div>
                        <div class="hover-icons">
                            <i class="ri-shopping-cart-line"></i>
                            <i class="ri-refresh-line"></i>
                            <i class="ri-search-line"></i>
                            <i class="ri-heart-line"></i>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="product-name fw-semibold">"Blue Dress For Woman"</div>
                        <div class="d-flex gap-2 mt-1">
                            <span class="price"><strong>$45.00</strong></span>
                            <span class="og-price"><s>$55.25</s></span>
                            <span class="text-success dis">35% Off</span>
                        </div>
                        <div class="d-flex gap-2 align-items-center">
                            <ul class="d-flex p-0 mb-0 gap-0">
                                <li class="text-warning list-unstyled"><i class="ri-star-fill"></i></li>
                                <li class="text-warning list-unstyled"><i class="ri-star-fill"></i></li>
                                <li class="text-warning list-unstyled"><i class="ri-star-fill"></i></li>
                                <li class="text-warning list-unstyled"><i class="ri-star-fill"></i></li>
                                <li class="text-warning list-unstyled"><i class="ri-star-line"></i></li>
                            </ul>
                            <span class="qty">(21)</span>
                        </div>
                    
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
